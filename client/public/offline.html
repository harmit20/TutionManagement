<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — TuitionApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #1e293b;
    }
    .card {
      background: white;
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .icon {
      width: 64px; height: 64px;
      background: #eef2ff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
    }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: .5rem; }
    p  { font-size: .9rem; color: #64748b; line-height: 1.6; }
    button {
      margin-top: 1.5rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: .75rem;
      padding: .75rem 1.5rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="#4f46e5" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection found. Check your connection and try again. Some features may still work from cache.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
